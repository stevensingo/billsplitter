<div id="root"></div>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useRef,useCallback}=React;

/* ── compress ─────────────────────────────────────────── */
function compress(file,maxPx=900,q=0.78){
  return new Promise((res,rej)=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let w=img.width,h=img.height;
      const s=Math.min(1,maxPx/Math.max(w,h));
      w=Math.round(w*s); h=Math.round(h*s);
      const c=document.createElement('canvas');
      c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      c.toBlob(blob=>{
        if(!blob){rej(new Error('compression failed'));return;}
        const r=new FileReader();
        r.onload=e=>res({b64:e.target.result.split(',')[1],mime:'image/jpeg',kb:Math.round(blob.size/1024),w,h});
        r.readAsDataURL(blob);
      },'image/jpeg',q);
    };
    img.onerror=rej; img.src=url;
  });
}

/* ── Groq ─────────────────────────────────────────────── */
const PROMPT=`Parse this receipt image. Return ONLY valid JSON, no markdown:
{"restaurant":"name or null","currency":"symbol e.g. Rp","items":[{"id":"i1","name":"item name","qty":1,"unit_price":0,"total_price":0}],"service_charge":0,"tax":0,"other_charges":[{"label":"name","amount":0}],"total":0}
Rules: qty is integer>=1, unit_price=total_price/qty, 0 for missing charges, other_charges=[] if none, amounts numbers only.`;

async function callGroq(key,b64,mime,onStatus){
  onStatus('UPLOADING...');
  const t0=Date.now();
  let resp;
  try{
    resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
      body:JSON.stringify({
        model:'meta-llama/llama-4-scout-17b-16e-instruct',
        messages:[{role:'user',content:[
          {type:'image_url',image_url:{url:`data:${mime};base64,${b64}`}},
          {type:'text',text:PROMPT}
        ]}],
        temperature:0.1, max_tokens:800,
        response_format:{type:'json_object'},
      })
    });
  }catch(e){throw new Error('Network error: '+e.message);}
  const ms=Date.now()-t0;
  onStatus(`PARSING... (${ms}ms)`);
  const raw=await resp.text();
  console.log('[SPLIT]',resp.status,ms+'ms',raw);
  let d;
  try{d=JSON.parse(raw);}catch(e){throw new Error('Bad response: '+raw.slice(0,120));}
  if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
  const txt=d.choices?.[0]?.message?.content||'';
  const match=txt.match(/\{[\s\S]*\}/);
  if(!match)throw new Error('No JSON in response: '+txt.slice(0,150));
  try{return JSON.parse(match[0]);}
  catch(e){throw new Error('Invalid JSON: '+match[0].slice(0,150));}
}

/* ── utils ────────────────────────────────────────────── */
function money(n,sym='Rp'){
  if(!n||isNaN(n))n=0;
  if(sym==='Rp'||sym==='IDR')return 'Rp\u00a0'+Math.round(n).toLocaleString('id-ID');
  return sym+Number(n).toFixed(2);
}
const Mono=({children,size=11,color='var(--t2)',style={}})=>(
  <span style={{fontFamily:'var(--mono)',fontSize:size,color,...style}}>{children}</span>
);
const Label=({children})=>(
  <Mono size={9} color='var(--t3)' style={{letterSpacing:'0.18em',textTransform:'uppercase',display:'block',marginBottom:6}}>{children}</Mono>
);
function TopBtn({onClick,children,accent}){
  return(
    <button onClick={onClick} style={{
      fontFamily:'var(--mono)',fontSize:10,letterSpacing:'0.1em',
      color:accent?'var(--accent)':'var(--t2)',background:'none',
      border:`1px solid ${accent?'rgba(0,212,160,.35)':'var(--b1)'}`,
      borderRadius:2,padding:'5px 10px',cursor:'pointer',
    }}>{children}</button>
  );
}

/* ── Key screen ───────────────────────────────────────── */
function KeyScreen({onSave}){
  const [val,setVal]=useState('');
  const [err,setErr]=useState('');
  const go=()=>{
    const k=val.trim();
    if(!k.startsWith('gsk_')){setErr('Key must start with gsk_');return;}
    localStorage.setItem('split_groq',k); onSave(k);
  };
  return(
    <div style={{minHeight:'100dvh',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px 20px'}}>
      <div style={{width:'100%',maxWidth:400}}>
        <Mono size={10} color='var(--accent)' style={{letterSpacing:'0.2em',display:'block',marginBottom:8}}>SPLIT BILL</Mono>
        <h1 style={{fontSize:22,fontWeight:600,marginBottom:8,color:'var(--t1)'}}>Connect Groq</h1>
        <p style={{fontSize:13,color:'var(--t2)',lineHeight:1.65,marginBottom:24}}>Groq is free, fast, and works everywhere. No credit card needed.</p>
        <div style={{borderLeft:'1.5px solid var(--b2)',paddingLeft:16,display:'flex',flexDirection:'column',gap:14,marginBottom:28}}>
          {[
            ['01',<>Go to <a href="https://console.groq.com/keys" target="_blank" style={{color:'var(--accent)',textDecoration:'none'}}>console.groq.com/keys</a></>],
            ['02','Sign up free → click "Create API Key"'],
            ['03','Copy key (starts with gsk_) → paste below'],
          ].map(([n,txt])=>(
            <div key={n} style={{display:'flex',gap:12}}>
              <Mono size={9} color='var(--t3)' style={{minWidth:18,paddingTop:2}}>{n}</Mono>
              <p style={{fontSize:13,color:'var(--t2)',lineHeight:1.5}}>{txt}</p>
            </div>
          ))}
        </div>
        <input type="password" placeholder="gsk_..." value={val}
          onChange={e=>{setVal(e.target.value);setErr('');}}
          onKeyDown={e=>e.key==='Enter'&&go()}
          style={{width:'100%',padding:'13px 14px',background:'var(--s1)',border:`1px solid ${err?'var(--red)':'var(--b2)'}`,borderRadius:4,fontSize:14,fontFamily:'var(--mono)',color:'var(--t1)',outline:'none',marginBottom:err?8:14,letterSpacing:'0.04em'}}
        />
        {err&&<Mono size={10} color='var(--red)' style={{display:'block',marginBottom:12,letterSpacing:'0.08em'}}>{err}</Mono>}
        <button onClick={go} style={{width:'100%',padding:14,background:'var(--accent)',color:'#001a12',border:'none',borderRadius:4,fontSize:13,fontWeight:600,fontFamily:'var(--mono)',letterSpacing:'0.12em',cursor:'pointer'}}>CONNECT →</button>
        <Mono size={9} color='var(--t3)' style={{display:'block',textAlign:'center',marginTop:12,lineHeight:1.8,letterSpacing:'0.1em'}}>FREE · ~14,400 SCANS/DAY · KEY STORED LOCALLY</Mono>
      </div>
    </div>
  );
}

/* ── Upload screen ────────────────────────────────────── */
function UploadScreen({onFile,error}){
  const [drag,setDrag]=useState(false);
  const fRef=useRef(),cRef=useRef();
  const pick=f=>{if(f?.type.startsWith('image/'))onFile(f);};
  return(
    <div style={{padding:'0 16px',display:'flex',flexDirection:'column',gap:10}}>
      <button onClick={()=>cRef.current.click()} style={{width:'100%',minHeight:68,border:'1px solid var(--accent)',borderRadius:4,background:'var(--abg)',color:'var(--accent)',fontSize:13,fontWeight:600,fontFamily:'var(--mono)',letterSpacing:'0.14em',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:12}}>
        <CamIcon/> SCAN RECEIPT
      </button>
      <input ref={cRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={e=>pick(e.target.files[0])}/>
      <div
        onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
        onDrop={e=>{e.preventDefault();setDrag(false);pick(e.dataTransfer.files[0]);}}
        onClick={()=>fRef.current.click()}
        style={{border:`1px dashed ${drag?'var(--accent)':'var(--b2)'}`,borderRadius:4,padding:'22px 16px',textAlign:'center',cursor:'pointer',background:drag?'var(--abg)':'transparent',transition:'all .15s'}}>
        <UploadIcon/>
        <p style={{fontSize:13,color:'var(--t2)',fontWeight:500,marginBottom:2}}>Upload from library</p>
        <Mono size={10} color='var(--t3)' style={{letterSpacing:'0.08em'}}>JPG · PNG · HEIC</Mono>
      </div>
      <input ref={fRef} type="file" accept="image/*" style={{display:'none'}} onChange={e=>pick(e.target.files[0])}/>
      {error&&(
        <div style={{padding:'10px 14px',border:'1px solid rgba(255,69,96,.3)',borderRadius:4,background:'rgba(255,69,96,.06)'}}>
          <Mono size={11} color='var(--red)' style={{lineHeight:1.6}}>ERR // {error}</Mono>
        </div>
      )}
    </div>
  );
}

/* ── Loading screen ───────────────────────────────────── */
function LoadingScreen({preview,status}){
  const steps=[
    ['COMPRESS IMAGE', !status.startsWith('COMPRESSING')],
    ['UPLOAD TO GROQ', status.startsWith('PARSING')],
    ['PARSE RECEIPT',  false],
  ];
  return(
    <div style={{padding:'16px',display:'flex',flexDirection:'column',alignItems:'center'}}>
      {preview&&(
        <div style={{position:'relative',width:'100%',maxHeight:180,borderRadius:4,overflow:'hidden',marginBottom:20,border:'1px solid var(--b1)'}}>
          <img src={preview} alt="" style={{width:'100%',maxHeight:180,objectFit:'cover',opacity:.3,display:'block'}}/>
          <div style={{position:'absolute',inset:0,background:'linear-gradient(to bottom,transparent 40%,var(--bg))'}}/>
          <div style={{position:'absolute',left:0,right:0,height:'2px',background:'linear-gradient(to right,transparent,var(--accent),transparent)',animation:'scanline 1.3s linear infinite',boxShadow:'0 0 8px var(--accent)'}}/>
        </div>
      )}
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
        <div style={{width:7,height:7,borderRadius:'50%',background:'var(--accent)',boxShadow:'0 0 10px var(--accent)',animation:'pulse .9s ease-in-out infinite'}}/>
        <Mono size={12} color='var(--accent)' style={{letterSpacing:'0.14em'}}>{status}</Mono>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8,width:'100%',maxWidth:260}}>
        {steps.map(([label,done])=>(
          <div key={label} style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:5,height:5,borderRadius:'50%',background:done?'var(--accent)':'var(--b2)',transition:'background .3s',flexShrink:0}}/>
            <Mono size={9} color={done?'var(--t2)':'var(--t3)'} style={{letterSpacing:'0.14em'}}>{label}</Mono>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── Item row (with share + edit) ─────────────────────── */
function ItemRow({item, count, onAdj, onUpdate, currency, delay, shareInfo, onShareToggle, onShareCount}){
  const [editing, setEditing]=useState(false);
  const [draft, setDraft]=useState({name:item.name, qty:item.qty, unit_price:item.unit_price});
  const active=count>0;
  const isShared=shareInfo?.enabled;

  const saveEdit=()=>{
    const qty=Math.max(1,parseInt(draft.qty)||1);
    const up=Math.max(0,parseFloat(draft.unit_price)||0);
    onUpdate({...item, name:draft.name||item.name, qty, unit_price:up, total_price:up*qty});
    setEditing(false);
  };

  const myAmount = isShared && shareInfo.count>1
    ? (count * item.unit_price) / shareInfo.count
    : count * item.unit_price;

  return(
    <div className="fade-up" style={{animationDelay:`${delay}ms`,borderBottom:'1px solid var(--b1)'}}>
      {/* main row */}
      <div style={{display:'flex',alignItems:'center',gap:8,padding:'11px 14px',minHeight:58,background:active?'var(--abg)':'transparent',transition:'background .15s'}}>
        <div style={{flex:1,minWidth:0}}>
          <p style={{fontSize:14,fontWeight:active?500:400,color:active?'var(--t1)':'var(--t2)',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.name}</p>
          <Mono size={10} color='var(--t3)' style={{marginTop:2}}>
            {item.qty>1?`${item.qty}× `:''}{money(item.unit_price,currency)}
          </Mono>
        </div>
        {/* stepper */}
        <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
          <StepBtn onClick={()=>onAdj(-1)} disabled={count===0} label="−"/>
          <Mono size={16} color={active?'var(--accent)':'var(--t3)'} style={{minWidth:24,textAlign:'center',fontWeight:500}}>{count}</Mono>
          <StepBtn onClick={()=>onAdj(+1)} disabled={count===item.qty} label="+"/>
        </div>
        {/* amount */}
        <Mono size={12} color={active?'var(--accent)':'var(--t3)'} style={{minWidth:76,textAlign:'right',flexShrink:0,fontWeight:active?500:400}}>
          {money(myAmount,currency)}
        </Mono>
      </div>

      {/* sub-row: share toggle + edit */}
      <div style={{display:'flex',alignItems:'center',gap:0,padding:'0 14px 9px',background:active?'var(--abg)':'transparent',transition:'background .15s'}}>
        {/* shared toggle */}
        <button
          onClick={()=>onShareToggle(item.id)}
          style={{display:'flex',alignItems:'center',gap:6,background:'none',border:'none',cursor:'pointer',padding:'4px 0',marginRight:12}}
        >
          <div style={{
            width:14,height:14,borderRadius:2,flexShrink:0,
            border:`1.5px solid ${isShared?'var(--accent)':'var(--b2)'}`,
            background:isShared?'var(--accent)':'transparent',
            display:'flex',alignItems:'center',justifyContent:'center',
            transition:'all .15s',
          }}>
            {isShared&&<svg width="8" height="8" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2" fill="none" stroke="#001a12" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
          </div>
          <Mono size={9} color={isShared?'var(--accent)':'var(--t3)'} style={{letterSpacing:'0.1em'}}>SHARED</Mono>
        </button>

        {isShared&&(
          <div style={{display:'flex',alignItems:'center',gap:6,marginRight:12}}>
            <Mono size={9} color='var(--t2)' style={{letterSpacing:'0.08em'}}>÷</Mono>
            <input
              type="number" min="2" max="99"
              value={shareInfo.count}
              onChange={e=>onShareCount(item.id,Math.max(2,parseInt(e.target.value)||2))}
              style={{width:40,padding:'3px 6px',background:'var(--s2)',border:'1px solid var(--b2)',borderRadius:3,fontFamily:'var(--mono)',fontSize:12,color:'var(--accent)',outline:'none',textAlign:'center'}}
            />
            <Mono size={9} color='var(--t2)' style={{letterSpacing:'0.06em'}}>PEOPLE</Mono>
          </div>
        )}

        {/* edit button */}
        <button
          onClick={()=>{setDraft({name:item.name,qty:item.qty,unit_price:item.unit_price});setEditing(e=>!e);}}
          style={{marginLeft:'auto',background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:5,padding:'4px 0'}}
        >
          <PencilIcon active={editing}/>
          <Mono size={9} color={editing?'var(--yellow)':'var(--t3)'} style={{letterSpacing:'0.1em'}}>{editing?'CANCEL':'CORRECT'}</Mono>
        </button>
      </div>

      {/* edit panel */}
      {editing&&(
        <div style={{padding:'10px 14px 12px',background:'var(--s1)',borderTop:'1px solid var(--b1)',display:'flex',flexDirection:'column',gap:8}}>
          <Mono size={9} color='var(--yellow)' style={{letterSpacing:'0.14em',marginBottom:2}}>CORRECT ITEM DATA</Mono>
          <div style={{display:'flex',gap:8}}>
            <div style={{flex:2}}>
              <Mono size={9} color='var(--t3)' style={{letterSpacing:'0.1em',display:'block',marginBottom:4}}>NAME</Mono>
              <input value={draft.name} onChange={e=>setDraft(d=>({...d,name:e.target.value}))}
                style={{width:'100%',padding:'7px 9px',background:'var(--s2)',border:'1px solid var(--b2)',borderRadius:3,fontFamily:'var(--sans)',fontSize:13,color:'var(--t1)',outline:'none'}}/>
            </div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <div style={{flex:1}}>
              <Mono size={9} color='var(--t3)' style={{letterSpacing:'0.1em',display:'block',marginBottom:4}}>QTY</Mono>
              <input type="number" min="1" value={draft.qty} onChange={e=>setDraft(d=>({...d,qty:e.target.value}))}
                style={{width:'100%',padding:'7px 9px',background:'var(--s2)',border:'1px solid var(--b2)',borderRadius:3,fontFamily:'var(--mono)',fontSize:13,color:'var(--t1)',outline:'none',textAlign:'center'}}/>
            </div>
            <div style={{flex:2}}>
              <Mono size={9} color='var(--t3)' style={{letterSpacing:'0.1em',display:'block',marginBottom:4}}>UNIT PRICE</Mono>
              <input type="number" min="0" value={draft.unit_price} onChange={e=>setDraft(d=>({...d,unit_price:e.target.value}))}
                style={{width:'100%',padding:'7px 9px',background:'var(--s2)',border:'1px solid var(--b2)',borderRadius:3,fontFamily:'var(--mono)',fontSize:13,color:'var(--t1)',outline:'none'}}/>
            </div>
          </div>
          <button onClick={saveEdit} style={{padding:'8px 0',background:'var(--yellow)',color:'#1a1400',border:'none',borderRadius:3,fontFamily:'var(--mono)',fontSize:11,fontWeight:600,letterSpacing:'0.12em',cursor:'pointer'}}>
            CONFIRM CORRECTION
          </button>
        </div>
      )}
    </div>
  );
}

function StepBtn({onClick,disabled,label}){
  return(
    <button onClick={onClick} disabled={disabled} style={{width:38,height:38,borderRadius:3,border:`1px solid ${disabled?'var(--b1)':'var(--b2)'}`,background:disabled?'transparent':'var(--s3)',color:disabled?'var(--t3)':'var(--t2)',cursor:disabled?'not-allowed':'pointer',fontSize:19,fontFamily:'var(--mono)',fontWeight:300,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
      {label}
    </button>
  );
}

/* ── Lightbox ─────────────────────────────────────────── */
function Lightbox({src,onClose}){
  return(
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.92)',zIndex:999,display:'flex',alignItems:'center',justifyContent:'center',padding:16,animation:'fadeIn .2s ease',cursor:'zoom-out'}}>
      <img src={src} alt="receipt" style={{maxWidth:'100%',maxHeight:'100%',objectFit:'contain',borderRadius:4,boxShadow:'0 0 60px rgba(0,0,0,.8)'}}/>
      <div style={{position:'absolute',top:16,right:16,padding:'6px 12px',background:'rgba(0,0,0,.6)',borderRadius:3,border:'1px solid var(--b2)'}}>
        <Mono size={10} color='var(--t2)' style={{letterSpacing:'0.1em'}}>TAP TO CLOSE</Mono>
      </div>
    </div>
  );
}

/* ── Icons ────────────────────────────────────────────── */
const CamIcon=()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>;
const UploadIcon=()=><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--t3)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{display:'block',margin:'0 auto 8px'}}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
const PencilIcon=({active})=><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={active?'var(--yellow)':'var(--t3)'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
const ResetIcon=()=><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>;

/* ── App ──────────────────────────────────────────────── */
function App(){
  const [key,    setKey]   =useState(()=>localStorage.getItem('split_groq')||'');
  const [stage,  setStage] =useState('upload');
  const [status, setStatus]=useState('');
  const [data,   setData]  =useState(null);
  const [preview,setPreview]=useState(null);
  const [sel,    setSel]   =useState({});
  const [shared, setShared]=useState({}); // {id: {enabled, count}}
  const [err,    setErr]   =useState(null);
  const [lightbox,setLightbox]=useState(false);

  if(!key)return <KeyScreen onSave={setKey}/>;

  const run=async(file)=>{
    setErr(null); setStage('loading'); setStatus('COMPRESSING IMAGE...');
    setPreview(URL.createObjectURL(file));
    let img;
    try{img=await compress(file); console.log(`[SPLIT] ${img.w}×${img.h} ${img.kb}KB`);}
    catch(e){setErr(e.message);setStage('upload');return;}
    try{
      const parsed=await callGroq(key,img.b64,img.mime,setStatus);
      setData(parsed);
      const s={},sh={};
      parsed.items.forEach(i=>{s[i.id]=0; sh[i.id]={enabled:false,count:2};});
      setSel(s); setShared(sh);
      setStage('result');
    }catch(e){console.error('[SPLIT]',e);setErr(e.message);setStage('upload');}
  };

  const adj=(id,d,max)=>setSel(s=>({...s,[id]:Math.max(0,Math.min(max,(s[id]||0)+d))}));
  const reset=()=>{
    if(!data)return;
    const s={};
    data.items.forEach(i=>s[i.id]=0);
    setSel(s);
  };
  const hardReset=()=>{setStage('upload');setData(null);setPreview(null);setSel({});setShared({});setErr(null);};

  const updateItem=(updated)=>{
    setData(d=>({...d,items:d.items.map(i=>i.id===updated.id?updated:i)}));
    // clamp selection to new qty
    setSel(s=>({...s,[updated.id]:Math.min(s[updated.id]||0,updated.qty)}));
  };
  const toggleShare=(id)=>setShared(s=>({...s,[id]:{...s[id],enabled:!s[id].enabled}}));
  const setShareCount=(id,n)=>setShared(s=>({...s,[id]:{...s[id],count:n}}));

  /* ── totals ── */
  const myItems = data ? data.items.map(item=>{
    const c=sel[item.id]||0;
    const sh=shared[item.id];
    const amt=sh?.enabled&&sh.count>1 ? (c*item.unit_price)/sh.count : c*item.unit_price;
    return {id:item.id,totalPrice:item.total_price,myAmt:amt};
  }) : [];

  const mySub  = myItems.reduce((s,i)=>s+i.myAmt,0);
  const totSub = myItems.reduce((s,i)=>s+i.totalPrice,0);
  const extras = data ? (data.service_charge||0)+(data.tax||0)+(data.other_charges||[]).reduce((s,c)=>s+c.amount,0) : 0;
  const ratio  = totSub>0?mySub/totSub:0;
  const total  = mySub+extras*ratio;
  const any    = mySub>0;

  const extraRows = data ? [
    data.service_charge>0&&{label:'SERVICE CHARGE',amount:data.service_charge},
    data.tax>0&&{label:'PAJAK / TAX',amount:data.tax},
    ...(data.other_charges||[]).map(c=>({label:c.label.toUpperCase(),amount:c.amount})),
  ].filter(Boolean) : [];

  return(
    <div style={{maxWidth:480,margin:'0 auto',minHeight:'100dvh',display:'flex',flexDirection:'column',background:'var(--bg)'}}>

      {lightbox&&preview&&<Lightbox src={preview} onClose={()=>setLightbox(false)}/>}

      {/* topbar */}
      <div style={{padding:'13px 16px 11px',borderBottom:'1px solid var(--b1)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:6,height:6,borderRadius:'50%',background:'var(--accent)',boxShadow:'0 0 8px var(--accent)',animation:'pulse 2s ease-in-out infinite'}}/>
          <Mono size={12} color='var(--t1)' style={{fontWeight:600,letterSpacing:'0.18em'}}>SPLIT BILL</Mono>
          {data?.restaurant&&(
            <span style={{fontFamily:'var(--mono)',fontSize:9,padding:'2px 7px',background:'var(--s2)',color:'var(--t2)',border:'0.5px solid var(--b2)',borderRadius:2,letterSpacing:'0.08em'}}>
              {data.restaurant.toUpperCase()}
            </span>
          )}
        </div>
        <div style={{display:'flex',gap:6}}>
          {stage==='result'&&<TopBtn onClick={reset}><ResetIcon/> RESET</TopBtn>}
          {stage==='result'&&<TopBtn onClick={hardReset}>NEW</TopBtn>}
          <TopBtn onClick={()=>{localStorage.removeItem('split_groq');setKey('');hardReset();}}>KEY</TopBtn>
        </div>
      </div>

      {/* content */}
      <div style={{flex:1,overflowY:'auto',padding:'14px 0 0',WebkitOverflowScrolling:'touch'}}>
        {stage==='upload'&&<UploadScreen onFile={run} error={err}/>}
        {stage==='loading'&&<LoadingScreen preview={preview} status={status}/>}

        {stage==='result'&&data&&(
          <div style={{padding:'0 16px'}}>

            {/* receipt thumbnail — clickable */}
            {preview&&(
              <div onClick={()=>setLightbox(true)} style={{position:'relative',marginBottom:12,cursor:'zoom-in',borderRadius:4,overflow:'hidden',border:'1px solid var(--b1)'}}>
                <img src={preview} alt="receipt" style={{width:'100%',maxHeight:110,objectFit:'cover',display:'block',transition:'opacity .2s'}}/>
                <div style={{position:'absolute',inset:0,background:'linear-gradient(to bottom,transparent 40%,rgba(6,8,9,.7))',display:'flex',alignItems:'flex-end',padding:'8px 10px'}}>
                  <Mono size={9} color='var(--t2)' style={{letterSpacing:'0.12em'}}>TAP TO ENLARGE ↗</Mono>
                </div>
              </div>
            )}

            {/* items */}
            <div style={{border:'1px solid var(--b1)',borderRadius:4,overflow:'hidden',marginBottom:10}}>
              <div style={{padding:'8px 14px',background:'var(--s1)',borderBottom:'1px solid var(--b1)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <Label>LINE ITEMS</Label>
                <Mono size={9} color='var(--t3)' style={{letterSpacing:'0.1em'}}>{data.items.length} ROWS</Mono>
              </div>
              {data.items.map((item,i)=>(
                <ItemRow key={item.id} item={item}
                  count={sel[item.id]||0}
                  onAdj={d=>adj(item.id,d,item.qty)}
                  onUpdate={updateItem}
                  currency={data.currency}
                  delay={i*25}
                  shareInfo={shared[item.id]}
                  onShareToggle={toggleShare}
                  onShareCount={setShareCount}
                />
              ))}
            </div>

            {/* shared charges */}
            {extraRows.length>0&&(
              <div style={{border:'1px solid var(--b1)',borderRadius:4,overflow:'hidden',marginBottom:10}}>
                <div style={{padding:'8px 14px',background:'var(--s1)',borderBottom:'1px solid var(--b1)'}}>
                  <Label>SHARED CHARGES</Label>
                </div>
                {extraRows.map((c,i)=>(
                  <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',borderBottom:i<extraRows.length-1?'1px solid var(--b1)':'none'}}>
                    <Mono size={11} color='var(--t2)' style={{letterSpacing:'0.06em'}}>{c.label}</Mono>
                    <Mono size={12} color={any?'var(--accent)':'var(--t3)'}>{any?money(c.amount*ratio,data.currency):money(c.amount,data.currency)}</Mono>
                  </div>
                ))}
                {any&&<div style={{padding:'5px 14px 8px',background:'var(--s1)'}}><Mono size={9} color='var(--t3)' style={{letterSpacing:'0.1em'}}>PRORATED AT {Math.round(ratio*100)}%</Mono></div>}
              </div>
            )}
          </div>
        )}
      </div>

      {/* footer total */}
      {stage==='result'&&data&&(
        <div style={{borderTop:'1px solid var(--b1)',background:'var(--s1)',padding:`10px 16px max(16px,env(safe-area-inset-bottom))`,flexShrink:0}}>
          {any&&(
            <div style={{display:'flex',justifyContent:'space-between',padding:'0 4px',marginBottom:8}}>
              {[['ITEMS',mySub],['CHARGES',extras*ratio],['TOTAL',total]].map(([l,v])=>(
                <div key={l}>
                  <Mono size={8} color='var(--t3)' style={{letterSpacing:'0.15em',display:'block',marginBottom:2}}>{l}</Mono>
                  <Mono size={11} color={l==='TOTAL'?'var(--accent)':'var(--t2)'} style={{fontWeight:500}}>{money(v,data.currency)}</Mono>
                </div>
              ))}
            </div>
          )}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',borderRadius:4,border:`1px solid ${any?'rgba(0,212,160,.25)':'var(--b1)'}`,background:any?'var(--abg)':'var(--s2)',transition:'all .25s'}}>
            <div>
              <Mono size={9} color={any?'var(--adim)':'var(--t3)'} style={{letterSpacing:'0.18em',display:'block',marginBottom:any?3:0}}>YOUR SHARE</Mono>
              {any&&<Mono size={9} color='var(--t3)' style={{letterSpacing:'0.06em'}}>{Math.round(ratio*100)}% OF BILL</Mono>}
            </div>
            <Mono size={28} color={any?'var(--accent)':'var(--t3)'} style={{fontWeight:600,letterSpacing:'-0.5px',transition:'color .25s'}}>
              {money(total,data?.currency)}
            </Mono>
          </div>
          {!any&&<Mono size={9} color='var(--t3)' style={{display:'block',textAlign:'center',marginTop:8,letterSpacing:'0.12em'}}>TAP + NEXT TO YOUR ITEMS</Mono>}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
